apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: mini-commerce
  labels:
    app: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      serviceAccountName: mini-commerce-workload
      containers:
        - name: inventory-service
          image: inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: Database__AutoMigrate
              value: "true"
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: mini-commerce-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ConnectionStrings__InventoryDB
              valueFrom:
                secretKeyRef:
                  name: mini-commerce-secrets
                  key: ConnectionStrings__InventoryDB
            - name: Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: mini-commerce-secrets
                  key: Jwt__SigningKey
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "mini-commerce-keyvault"
