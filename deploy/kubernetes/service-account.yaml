apiVersion: v1
kind: ServiceAccount
metadata:
  name: mini-commerce-workload
  namespace: mini-commerce
  annotations:
    # Replace with your user-assigned managed identity client ID after enabling Workload Identity on AKS
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"
  labels:
    azure.workload.identity/use: "true"
