# Azure Key Vault Provider for Secrets Store CSI Driver
# Prerequisites:
#   - AKS with Secrets Store CSI Driver + Azure Key Vault provider add-on (or installed via Helm)
#   - Workload Identity (preferred) or aad-pod-identity
#   - Secrets created in Key Vault with the object names below
#
# Secret name mapping (Key Vault secret name -> env key):
#   ConnectionStrings--OrderDB
#   ConnectionStrings--InventoryDB
#   ConnectionStrings--NotificationDB
#   ConnectionStrings--AuthDB
#   ConnectionStrings--CatalogDB
#   ConnectionStrings--CartDB
#   ServiceBus--ConnectionString
#   Jwt--SigningKey
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mini-commerce-keyvault
  namespace: mini-commerce
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "00000000-0000-0000-0000-000000000000" # Workload Identity client ID
    keyvaultName: "YOUR_KEYVAULT_NAME"
    tenantId: "YOUR_AZURE_TENANT_ID"
    objects: |
      array:
        - |
          objectName: ConnectionStrings--OrderDB
          objectType: secret
          objectAlias: ConnectionStrings__OrderDB
        - |
          objectName: ConnectionStrings--InventoryDB
          objectType: secret
          objectAlias: ConnectionStrings__InventoryDB
        - |
          objectName: ConnectionStrings--NotificationDB
          objectType: secret
          objectAlias: ConnectionStrings__NotificationDB
        - |
          objectName: ConnectionStrings--AuthDB
          objectType: secret
          objectAlias: ConnectionStrings__AuthDB
        - |
          objectName: ConnectionStrings--CatalogDB
          objectType: secret
          objectAlias: ConnectionStrings__CatalogDB
        - |
          objectName: ConnectionStrings--CartDB
          objectType: secret
          objectAlias: ConnectionStrings__CartDB
        - |
          objectName: ServiceBus--ConnectionString
          objectType: secret
          objectAlias: ServiceBus__ConnectionString
        - |
          objectName: Jwt--SigningKey
          objectAlias: Jwt__SigningKey
        - |
          objectName: ServiceBus--FullyQualifiedNamespace
          objectType: secret
          objectAlias: ServiceBus__FullyQualifiedNamespace
        - |
          objectName: BlobStorage--ServiceUri
          objectType: secret
          objectAlias: BlobStorage__ServiceUri
        - |
          objectName: ApplicationInsights--ConnectionString
          objectType: secret
          objectAlias: ApplicationInsights__ConnectionString
        - |
          objectName: ApiKeys--Internal
          objectType: secret
          objectAlias: ApiKeys__Internal
  secretObjects:
    - secretName: mini-commerce-secrets
      type: Opaque
      data:
        - objectName: ConnectionStrings__OrderDB
          key: ConnectionStrings__OrderDB
        - objectName: ConnectionStrings__InventoryDB
          key: ConnectionStrings__InventoryDB
        - objectName: ConnectionStrings__NotificationDB
          key: ConnectionStrings__NotificationDB
        - objectName: ConnectionStrings__AuthDB
          key: ConnectionStrings__AuthDB
        - objectName: ConnectionStrings__CatalogDB
          key: ConnectionStrings__CatalogDB
        - objectName: ConnectionStrings__CartDB
          key: ConnectionStrings__CartDB
        - objectName: ServiceBus__ConnectionString
          key: ServiceBus__ConnectionString
        - objectName: ServiceBus__FullyQualifiedNamespace
          key: ServiceBus__FullyQualifiedNamespace
        - objectName: Jwt__SigningKey
          key: Jwt__SigningKey
        - objectName: BlobStorage__ServiceUri
          key: BlobStorage__ServiceUri
        - objectName: ApplicationInsights__ConnectionString
          key: ApplicationInsights__ConnectionString
        - objectName: ApiKeys__Internal
          key: ApiKeys__Internal
