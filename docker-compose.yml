services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mini-commerce-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Password123"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_strong_Password123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  auth-service:
    build:
      context: .
      dockerfile: src/AuthService.API/Dockerfile
    ports:
      - "8083:8083"
    environment:
      ASPNETCORE_URLS: http://+:8083
      ConnectionStrings__AuthDB: "Server=sqlserver,1433;Database=AuthDB;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False"
      Jwt__Issuer: MiniCommerce
      Jwt__Audience: MiniCommerce
      Jwt__SigningKey: MiniCommerce_Dev_Signing_Key_Change_In_Production_32chars
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      sqlserver:
        condition: service_healthy

  catalog-service:
    build:
      context: .
      dockerfile: src/CatalogService.API/Dockerfile
    ports:
      - "8084:8084"
    environment:
      ASPNETCORE_URLS: http://+:8084
      ConnectionStrings__CatalogDB: "Server=sqlserver,1433;Database=CatalogDB;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False"
      Jwt__SigningKey: MiniCommerce_Dev_Signing_Key_Change_In_Production_32chars
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      sqlserver:
        condition: service_healthy

  cart-service:
    build:
      context: .
      dockerfile: src/CartService.API/Dockerfile
    ports:
      - "8085:8085"
    environment:
      ASPNETCORE_URLS: http://+:8085
      ConnectionStrings__CartDB: "Server=sqlserver,1433;Database=CartDB;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False"
      Jwt__SigningKey: MiniCommerce_Dev_Signing_Key_Change_In_Production_32chars
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      sqlserver:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService.API/Dockerfile
    ports:
      - "8081:8081"
    environment:
      ASPNETCORE_URLS: http://+:8081
      ConnectionStrings__InventoryDB: "Server=sqlserver,1433;Database=InventoryDB;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False"
      Jwt__SigningKey: MiniCommerce_Dev_Signing_Key_Change_In_Production_32chars
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      sqlserver:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: src/NotificationService.API/Dockerfile
    ports:
      - "8082:8082"
    environment:
      ASPNETCORE_URLS: http://+:8082
      ConnectionStrings__NotificationDB: "Server=sqlserver,1433;Database=NotificationDB;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      ServiceBus__Enabled: "${SERVICEBUS_ENABLED:-false}"
      ServiceBus__ConnectionString: "${SERVICEBUS_CONNECTION_STRING:-}"
      ServiceBus__TopicName: "orders"
      ServiceBus__SubscriptionName: "notification-service"
    depends_on:
      sqlserver:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: src/OrderService.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OrderDB: "Server=sqlserver,1433;Database=OrderDB;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;Encrypt=False"
      Services__Inventory: "http://inventory-service:8081"
      Services__Notification: "http://notification-service:8082"
      Jwt__SigningKey: MiniCommerce_Dev_Signing_Key_Change_In_Production_32chars
      Cors__AllowedOrigins__0: "http://localhost:5173"
      ServiceBus__Enabled: "${SERVICEBUS_ENABLED:-false}"
      ServiceBus__ConnectionString: "${SERVICEBUS_CONNECTION_STRING:-}"
      ServiceBus__TopicName: "orders"
    depends_on:
      sqlserver:
        condition: service_healthy
      inventory-service:
        condition: service_started
      notification-service:
        condition: service_started
      auth-service:
        condition: service_started

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService.API/Dockerfile
    ports:
      - "8086:8086"
    environment:
      ASPNETCORE_URLS: http://+:8086
      Jwt__Issuer: MiniCommerce
      Jwt__Audience: MiniCommerce
      Jwt__SigningKey: MiniCommerce_Dev_Signing_Key_Change_In_Production_32chars
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      auth-service:
        condition: service_started

volumes:
  sqldata:
